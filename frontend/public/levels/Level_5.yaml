description: |
  Congratulations, Pilot!
  Your basic training is complete. It's time for your first real mission.
  A customer is waiting for an important package.
   
  First, fly above the package and collect it using `drone.pickup()`.
  Then fly to the delivery zone and use `drone.deliver()` to complete the delivery.

  ### Mission:
  - Deliver the <span class="text-amber-600 font-bold">Package</span>.
  - Reach the <span class="text-red-500 font-bold">Portal</span>.

