id: 7

title: Level 7

homepage_intro: "Push & Collect"

tags:
  - Hard
  - Push
  - Coins

description: |
  Welcome to **Level 7** - Obstacles & Coins!

  A new tool for your toolbox:<br>
  - `drone.push()` shoves a movable crate one cell forward, then flies the drone into the space it left behind.<br>

  You already know `drone.scan()` from a previous level - combine it with `push()` to detect
  the crate before shoving it out of the way.

  This level blocks the direct path with a crate, and hides a coin down a side path.
  You must collect the coin before you're allowed to finish!

  ### Instructions:
  - There is a crate blocking the way forward. Use `drone.push()` to clear it.
  - After pushing, the crate is still right in front of you - fly around it using the open lane to its side.
  - A coin is hidden down a branch off the main path. Collect it before reaching the portal, or the level won't complete.
  - Reach the <span class="text-red-500 font-bold">Portal</span> to end the Level!
  - Don't crash into the <span class="text-purple-500 font-bold">World</span> <span class="text-purple-500">Border</span>.

  ### Example:
  ```code
  if drone.scan() == "movable_block":
      drone.push()
  ```

spawn: { x: 1, y: 1, z: 6 }

solve_conditions:
  finish_block: true
  collected_coins: 1

