description: |
  Welcome to **Level 9** - Forest Navigation!

  Every level so far has kept you flying at a single height. This forest doesn't let you off that easy:<br>
  a thick trunk blocks the path at drone height, and its canopy blocks the way above that too.<br>
  Time to learn `drone.up()` and `drone.down()` - each moves the drone one block vertically, no matter which way it's facing.<br>
  <br>
  You'll need to climb over the trunk, squeeze through a gap in the canopy, then drop back down on the other side.
  A coin is hidden along the detour - the Portal won't let you finish without it.

  ### Instructions:
  - Use `drone.up()` and `drone.down()` to change altitude.
  - Combine them with `drone.turn_left()` / `drone.turn_right()` and `drone.move()` to steer around the tree.
  - Use `drone.scan()` if you want to check what's ahead before committing to a move.
  - Collect the coin along the way.
  - Reach the <span class="text-red-500 font-bold">Portal</span> to end the Level!
  - Don't crash into the <span class="text-purple-500 font-bold">World</span> <span class="text-purple-500">Border</span> or the tree.

  ### Example:
  ```code
  drone.up()
  drone.up()
  drone.move()
  drone.down()
  ```

