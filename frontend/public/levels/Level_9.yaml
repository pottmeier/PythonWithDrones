id: 9

title: Decision Time

homepage_intro: "Make Decisions with If and Else."

tags:
  - Medium
  - Conditionals
  - Logic

description: |
  Until now, your drone has followed every command exactly as you wrote it. But what happens when something unexpected blocks the way?
  In this level, your drone will learn to **make decisions** using `if` and `else`. 
  
  First, use `drone.scan()` to check the block directly in front of the drone. Then decide what to do based on the result.
  A condition always evaluates to either `True` or `False`. If the condition is `True`, the code inside the `if` block runs. Otherwise, the code inside the `else` block is executed.

  ### Example

  ```code
  if drone.scan() == 'air':
     drone.move()
  else:
      drone.turn_right()
  ```

  ### Mission:
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - Use `if` and `else` to make decisions based on what the drone sees in front of it.

spawn: { x: 0, y: 1, z: 8}

