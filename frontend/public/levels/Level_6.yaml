id: 6

title: Putting it all together

homepage_intro: "Put your new skills to the test."

tags:
  - Intro
  - Medium

description: |
  Congratulations, Pilot!
  Your basic training is complete. Now it's time to put your new skills to the test. 

  In this level, you'll need to use everything you've learned so far to navigate through a series of obstacles and reach the finish portal.
  If you have trouble remembering the commands, check out the <a href="/documentation" class="underline">**documentation**</a>.

  **Note:** Do you see the coin? You must collect it before reaching the finish portal.

  ### Mission:
  - Deliver the <span class="text-amber-600 font-bold">Package</span>.
  - Collect the <span class="text-yellow-500 font-bold">Coin</span>.
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - You may use all the commands you've learned so far.

