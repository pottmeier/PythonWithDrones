description: |
  Not every obstacle can be flown around.
  But luckily, crates can be moved out of the way.

  Use `drone.push()` while flying next to a movable crate.

  ### Mission
  - Push the crate away using `drone.push()`.
  - Reach the <span class="text-red-500 font-bold">Portal</span>.

