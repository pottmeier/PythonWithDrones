description: |
  Great job completing **Level 1**! 

  Moving forward is great, but what if the destination is not directly ahead?
  Now it's time to learn how to **turn** your drone.
  You will need to combine movement with turning to finish this level.

  Use `drone.turn_left()` to rotate the drone **90°** to the left.

  ### Mission
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - Use only `drone.move()` and `drone.turn_left()`

