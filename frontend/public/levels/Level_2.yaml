id: 2

title: Left or Right?

homepage_intro: "Master turning."

tags:
  - Intro
  - Easy
  - Turning

description: |
  Excellent! 
  You now know how to move your drone. 
  But what if the destination is not straight ahead? 
  A skilled pilot can turn his drone to the left or the right.

  In this level, you will learn `drone.turn_right()` and `drone.turn_left()` to rotate the drone **90°** to the right and left respectively.

  Combine `drone.turn_left()` and `drone.turn_right()` to reach the portal.

  ### Mission:
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - Use only `drone.move()`, `drone.turn_left()`, and `drone.turn_right()`

spawn: { x: 2, y: 1, z: 4 }

