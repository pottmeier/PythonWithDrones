id: 3

title: Left or Right?

homepage_intro: "Master both directions."

tags:
  - Intro
  - Easy
  - Turning

description: |
  Excellent! 
  You now know how to turn your drone to the left. 
  But what if the destination is to the right? 
  A skilled pilot can turn in both directions.

  In this level, you will learn `drone.turn_right()` to rotate the drone **90°** to the right.

  Combine `drone.turn_left()` and `drone.turn_right()` to reach the portal.

  ### Mission
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - Use only `drone.move()`, `drone.turn_left()`, and `drone.turn_right()`

spawn: { x: 2, y: 1, z: 4 }

