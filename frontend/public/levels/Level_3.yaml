id: 3

title: Wings of Freedom

homepage_intro: "Learn to fly vertically."

tags:
  - Intro
  - Easy
  - Vertical Movement

description: |
  Congratulations!
  You have mastered flying on the ground.
  But what if your way ahead is blocked? Real drones can also fly vertically.

  In this level, you will learn `drone.up()` and `drone.down()` to move vertically..

  ### Mission:
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - Use only `drone.move()`, `drone.up()` and `drone.down()`

