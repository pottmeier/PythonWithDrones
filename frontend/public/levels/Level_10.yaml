id: 10

title: While There's a Way

homepage_intro: "Don't stop until the mission is complete."

tags:
  - Medium
  - While Loops
  - Logic

description: |
  You have used **for loops** with a fixed count.
  But what if you don't know how many steps you need?
  That's where the **while loop** comes in!

  A **while loop** will keep running until a condition is met. You can use `drone.at_goal()` to check whether the drone is at the finish portal or not.
  If the condition is `True`, the code inside the `while` block runs. Otherwise, the loop ends.

  ### Example:
  ```code
  while not drone.at_goal():
    drone.move()
  ```

  ### Mission:
  - Reach the <span class="text-red-500 font-bold">Portal</span>.
  - Use the **while loop** with everything you learned so far.

