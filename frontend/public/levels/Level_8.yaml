description: |
  Welcome to **Level 8** - Crate & Delivery!

  Two new commands this time:<br>
  - `drone.pickup()` picks up a package, but only while the drone is sitting right on top of it.<br>
  - `drone.deliver()` drops off a package you're carrying, but only while the drone is sitting right on top of the delivery pad.<br>

  Neither happens automatically - just flying over the package or the pad does nothing on its own.

  ### Instructions:
  - Detour off the main corridor to reach the package, then call `drone.pickup()`.
  - Push the crate onto the target pad, then fly around it using the open lane to its side.
  - Fly to the delivery pad and call `drone.deliver()` before reaching the portal.
  - Reach the <span class="text-red-500 font-bold">Portal</span> to end the Level - it won't let you finish
    until the crate is in place and the package is delivered!
  - Don't crash into the <span class="text-purple-500 font-bold">World</span> <span class="text-purple-500">Border</span>.

  ### Example:
  ```code
  ahead = drone.scan()
  if "movable_block" in ahead:
      drone.push()
  drone.pickup()
  ```

spawn: { x: 1, y: 1, z: 7 }

