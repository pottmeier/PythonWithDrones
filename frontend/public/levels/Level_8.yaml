description: |
  Great, you have learned loops and variables. Now let's take it a step further with **functions**!

  A function is a **reusable block of code**. You can also use functions with parameters like variables see the example.
  Like loops functions in python rely on identation, blocks you want in that function need to be idented!

  ### Example:

  ```code
  def move(steps):
    for i in range(steps):
      drone.move()

  move(1)
  move(2)
  ```

  ### Mission:
  - Define a **function** for the repeating path pattern.
  - Call your **function** multiple times.
  - Reach the <span class="text-red-500 font-bold">Portal</span>. 

