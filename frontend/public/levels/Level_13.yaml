id: 13

title: Fly, Forest, Fly!

homepage_intro: "The trees won't stop you, just fly over them."

tags:
  - Hard
  - Vertical Movement
  - Coins

description: |
  This time you face a thightly packed forest. But there are small gaps between the trees that you can fly through. 
  And there's a coin hidden in the middle of the forest! Collect it before you finish the level.

  ### Mission:
  - Collect the <span class="text-yellow-500 font-bold">Coin</span>.
  - Reach the <span class="text-red-500 font-bold">Portal</span>.

