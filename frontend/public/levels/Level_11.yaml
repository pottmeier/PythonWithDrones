id: 11

title: Push 'n Collect

homepage_intro: "Move obstacles aside and claim every coin."

tags:
  - Hard
  - Push
  - Coins

description: |
  This level blocks the direct path with a crate, and hides a coin down a side path.
  You must collect the coin before you're allowed to finish!

  ### Mission:
  - Push the <span class="text-white-500 font-bold">Crate</span> out of the way.
  - Collect the <span class="text-yellow-500 font-bold">Coin</span>.
  - Reach the <span class="text-red-500 font-bold">Portal</span>.

spawn: { x: 1, y: 1, z: 6 }

