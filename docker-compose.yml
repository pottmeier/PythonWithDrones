services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3005:3005"
    environment:
      NEXT_PUBLIC_LEADERBOARD_URL: ${NEXT_PUBLIC_LEADERBOARD_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./leaderboard-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://pguser:pgpass@db:5432/leaderboard}
      JWT_SECRET: ${JWT_SECRET:-changeme-set-in-prod}
      ADMIN_SECRET: ${ADMIN_SECRET:-changeme-set-in-prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3005,https://pottmeier.github.io}
    volumes:
      - ./leaderboard-api/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: leaderboard
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./leaderboard-api/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d leaderboard"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
