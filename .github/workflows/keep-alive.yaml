name: Supabase Keep Alive

on:
  schedule:
    # Führt den Workflow alle 4 Tage aus (Supabase pausiert nach 7 Tagen)
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Ermöglicht das manuelle Starten zum Testen

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Leaderboard Table
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/leaderboard?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
